name: Deploy to EC2

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: # GitHub 웹에서 수동으로 실행할 수 있는 옵션

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Create .env file for deployment
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> .env
          echo "SUPABASE_KEY=${{ secrets.SUPABASE_KEY }}" >> .env
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env
          echo "CORS_ORIGINS=*" >> .env
          
      - name: Copy files via SSH
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "."
          target: "/home/${{ secrets.EC2_USERNAME }}/TeamTeam_backend"
          
      - name: Setup Nginx HTTPS and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # ── 1. Nginx 설치 (이미 설치돼 있으면 건너뜀) ──────────────────
            if ! command -v nginx &> /dev/null; then
              sudo apt-get update -y
              sudo apt-get install -y nginx
            fi

            # ── 2. 자체 서명 SSL 인증서 생성 (없을 때만) ────────────────────
            if [ ! -f /etc/ssl/certs/teamteam.crt ]; then
              sudo openssl req -x509 -nodes -days 3650 -newkey rsa:2048 \
                -keyout /etc/ssl/private/teamteam.key \
                -out /etc/ssl/certs/teamteam.crt \
                -subj "/CN=${{ secrets.EC2_HOST }}"
              echo "SSL certificate created."
            else
              echo "SSL certificate already exists, skipping."
            fi

            # ── 3. Nginx 설정 파일 배포 ──────────────────────────────────────
            sudo cp /home/${{ secrets.EC2_USERNAME }}/TeamTeam_backend/nginx/teamteam.conf \
              /etc/nginx/sites-available/teamteam

            # default 사이트 비활성화, teamteam 활성화
            sudo rm -f /etc/nginx/sites-enabled/default
            sudo ln -sf /etc/nginx/sites-available/teamteam \
              /etc/nginx/sites-enabled/teamteam

            # ── 4. Nginx 설정 검증 및 재시작 ─────────────────────────────────
            sudo nginx -t && sudo systemctl reload nginx
            sudo systemctl enable nginx

            # ── 5. Docker 앱 빌드 및 재실행 ──────────────────────────────────
            cd /home/${{ secrets.EC2_USERNAME }}/TeamTeam_backend
            docker system prune -af --volumes
            docker compose up --build -d
